name: ci

on:
  push:
    branches:
      - main
      - feat/**
  pull_request:
    branches:
      - main

jobs:
  backend-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements-dev.txt

      - name: Compile check
        working-directory: backend
        run: |
          python -m py_compile database.py llm_service.py main.py models.py schemas.py

      - name: Run tests
        working-directory: backend
        run: |
          pytest -q
